<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .add-todo {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-todo input {
      flex: 1;
      padding: 8px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .add-todo button {
      padding: 8px 16px;
      font-size: 16px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .add-todo button:hover {
      background: #357abd;
    }

    #todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    #todo-list li.completed span {
      text-decoration: line-through;
      color: #aaa;
    }

    #todo-list li span {
      flex: 1;
      font-size: 16px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }

    .delete-btn:hover {
      color: #c0392b;
    }

    #remaining {
      text-align: center;
      color: #888;
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>TODO</h1>

  <div class="add-todo">
    <input type="text" id="new-todo" placeholder="What needs to be done?">
    <button onclick="addTodo()">Add</button>
  </div>

  <ul id="todo-list"></ul>

  <p id="remaining"></p>

  <script>
    var todos = [];

    document.getElementById('new-todo').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    function addTodo() {
      var input = document.getElementById('new-todo');
      var text = input.value.trim();
      if (!text) return;

      todos.push({ text: text, completed: false });
      input.value = '';
      render();
    }

    function toggleTodo(index) {
      todos[index].completed = !todos[index].completed;
      render();
    }

    function deleteTodo(index) {
      todos.splice(index, 1);
      render();
    }

    function render() {
      var list = document.getElementById('todo-list');
      list.innerHTML = '';

      for (var i = 0; i < todos.length; i++) {
        var todo = todos[i];
        var li = document.createElement('li');
        if (todo.completed) li.classList.add('completed');

        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.completed;
        checkbox.addEventListener('change', (function(idx) {
          return function() { toggleTodo(idx); };
        })(i));

        var span = document.createElement('span');
        span.textContent = todo.text;

        var btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '✕';
        btn.addEventListener('click', (function(idx) {
          return function() { deleteTodo(idx); };
        })(i));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      }

      var remaining = todos.filter(function(t) { return !t.completed; }).length;
      document.getElementById('remaining').textContent =
        todos.length === 0 ? '' : remaining + ' item' + (remaining !== 1 ? 's' : '') + ' left';
    }
  </script>

</body>
</html>
